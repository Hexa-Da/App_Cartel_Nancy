    <script>
      // Appliquer le thème sombre par défaut avant le chargement de l'application
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme === null) {
        localStorage.setItem('theme', 'true');
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.setAttribute('data-theme', storedTheme === 'true' ? 'dark' : 'light');
      }
    </script>
